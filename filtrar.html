<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🚛ITS rigel filter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-gH2yIJqKdNHPEq0n4Mqa/HGKIhSkIHeL5AyhkYV8i59U5AR6csBvApHHNl/vI1Bx" crossorigin="anonymous">    
    <style>
      table {
        width: 100%;
        border-collapse: collapse;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 14px;
        margin-top: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }
      thead {
        background-color: #0078D4;
        color: white;
      }
      th, td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #ddd;
      }
      .tr-filtros th {
        background-color: #f8f9fa;
        padding: 5px;
      }
      .input-filtro {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 4px;
        font-size: 12px;
        color: #333;
      }
      tbody tr:hover { background-color: #f1f1f1; }
      tbody tr:nth-child(even) { background-color: #f9f9f9; }
      
      /* Estilo para el switch de activación */
      .switch-container {
        margin-top: 20px;
        padding: 10px;
        background: #f8f9fa;
        border-radius: 5px;
        border: 1px solid #eee;
      }
    </style>
  </head>
  <body style="font-size: 10px">
    <nav class="nav nav-tabs mb-3 bg-light container">
      <a class="nav-item nav-link" href="./index.html">Tabla</a>
      <a class="nav-item nav-link" href="./dashboard.html">DashBoard</a>
      <a class="nav-item nav-link" href="./extrae-txt.html">Extrae-txt</a>
      <a class="nav-item nav-link active" href="./filtrar.html">Filtrar</a>
    </nav>

      <div class="switch-container mt-4">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="checkActivar" enabled>
          <label class="form-check-label fw-bold" for="checkActivar">search</label>
        </div>
      </div>

      <div id="contenedor-entrada" class="mt-3" style="display: block;">
        <textarea id="campo-texto" class="form-control" rows="10" placeholder="Pega aquí los códigos separados por línea (Ej: Z67-4034)"></textarea>
        <div id="resultado-busqueda" class="mt-2 p-3 border rounded bg-light">
          <span class="text-muted italic">Resultados de búsqueda...</span>
        </div>
      </div>

    
    
    <div class="container-lg">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Sistema</th>
            <th>Vehículo</th>
            <th>Descripción</th>
            <th>Fecha</th>
            <th>Días Fuera</th>
            <th>Estado</th>
            <th>Ruta</th>
            <th>Time/Map</th>
          </tr>
          <tr class="tr-filtros">
            <th></th>
            <th><input type="text" class="input-filtro" placeholder="Filtrar..." onkeyup="filtrarColumnas()"></th>
            <th><input type="text" class="input-filtro" placeholder="Filtrar..." onkeyup="filtrarColumnas()"></th>
            <th><input type="text" class="input-filtro" placeholder="Filtrar..." onkeyup="filtrarColumnas()"></th>
            <th><input type="text" class="input-filtro" placeholder="Filtrar..." onkeyup="filtrarColumnas()"></th>
            <th><input type="text" class="input-filtro" placeholder="Filtrar..." onkeyup="filtrarColumnas()"></th>
            <th><input type="text" class="input-filtro" placeholder="Filtrar..." onkeyup="filtrarColumnas()"></th>
            <th><input type="text" class="input-filtro" placeholder="Filtrar..." onkeyup="filtrarColumnas()"></th>
            <th><input type="text" class="input-filtro" placeholder="Filtrar..." onkeyup="filtrarColumnas()"></th>
          </tr>
        </thead>
        <tbody id="tablaEnriquecida">
          </tbody>
      </table>
      
      <div id="loader" class="text-center mt-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p>Cargando datos...</p>
      </div>

      
    </div>

    <script src="filtrar.js"></script>

    <script>
      /**
       * Función de filtrado multidireccional de la tabla
       */
      function filtrarColumnas() {
        const tabla = document.getElementById("tablaEnriquecida");
        const filas = tabla.getElementsByTagName("tr");
        const inputs = document.querySelectorAll(".input-filtro");

        for (let i = 0; i < filas.length; i++) {
          let coincidenTodos = true;
          const celdas = filas[i].getElementsByTagName("td");

          inputs.forEach((input, index) => {
            const valorFiltro = input.value.toUpperCase();
            const celda = celdas[index + 1];
           
            if (celda) {
              const textoCelda = celda.textContent || celda.innerText;
              if (textoCelda.toUpperCase().indexOf(valorFiltro) === -1) {
                coincidenTodos = false;
              }
            }
          });

          filas[i].style.display = coincidenTodos ? "" : "none";
        }
      }
    </script>
  </body>
</html>
