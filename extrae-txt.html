<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola SIRCI Operativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .alto-fijo { height: 500px; }
        textarea { resize: none; }
        .tabla-ultra-compacta td { padding: 2px 4px !important; line-height: 1.15; vertical-align: top; }
        @keyframes pulse-red { 0% { background-color: #fee2e2; } 50% { background-color: #f87171; } 100% { background-color: #fee2e2; } }
        .alerta-critica { animation: pulse-red 2s infinite; color: #7f1d1d !important; }
    </style>
</head>
<body class="bg-slate-200 p-2 lg:p-4">
    <div class="max-w-[100%] mx-auto space-y-2">
       
        <!-- BARRA DE CONTROL SUPERIOR -->
        <div class="bg-slate-800 rounded-lg shadow-xl overflow-hidden border-b-4 border-blue-600 text-white">
            <div class="flex flex-wrap md:flex-nowrap items-stretch">
               
                <!-- TÍTULO -->
                <div class="flex-grow p-3 border-r border-slate-700 min-w-[300px]">
                    <span class="text-[10px] text-slate-400 uppercase font-black block mb-1">Título del Reporte</span>
                    <div class="flex items-center gap-2">
                        <div id="tituloReporte" class="font-bold text-base truncate">Esperando datos...</div>
                        <button onclick="copiarTextoSimple('tituloReporte')" class="text-[10px] bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded font-bold">COPIAR</button>
                    </div>
                </div>


                <!-- TIEMPO -->
                <div id="contTiempo" class="w-full md:w-48 p-3 border-r border-slate-700 flex flex-col justify-center text-center bg-slate-900">
                    <span class="text-[10px] text-slate-400 uppercase font-black block mb-1">Transcurrido</span>
                    <div id="tiempoTranscurrido" class="font-black text-xl leading-none">--</div>
                </div>


                <!-- MAPA CON URL SOLICITADA -->
                <div id="contenedorMapa" class="w-full md:w-64 p-2 flex items-center justify-center bg-slate-700">
                    <button disabled class="bg-slate-600 text-slate-500 px-4 py-2 rounded text-xs font-bold w-full cursor-not-allowed uppercase">Sin Ubicación</button>
                </div>
            </div>
        </div>


        <!-- CUADROS DE TRABAJO -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-3">
            <div class="bg-white rounded shadow-md flex flex-col border-t-4 border-blue-600">
                <div class="p-2 border-b bg-blue-50 flex justify-between items-center text-[10px] font-bold uppercase text-blue-800">
                    <span>1. Entrada SIRCI</span>
                    <button onclick="limpiarTodo()" class="bg-red-600 text-white px-2 py-0.5 rounded">LIMPIAR</button>
                </div>
                <div class="p-2"><textarea id="inputReporte" class="w-full alto-fijo p-2 border border-slate-200 rounded font-mono text-[12px] outline-none" placeholder="Pegue aquí..."></textarea></div>
            </div>


            <div class="bg-white rounded shadow-md flex flex-col border-t-4 border-green-600">
                <div class="p-2 border-b bg-green-50 flex justify-between items-center text-[10px] font-bold uppercase text-green-800">
                    <span>2. Formato STS</span>
                    <button onclick="copiarTextoArea('outputSTS')" class="bg-green-600 text-white px-4 py-0.5 rounded">COPIAR</button>
                </div>
                <div class="p-2"><textarea id="outputSTS" readonly class="w-full alto-fijo p-2 bg-slate-50 border border-slate-200 rounded font-mono text-[12px] outline-none"></textarea></div>
            </div>


            <div class="bg-white rounded shadow-md flex flex-col border-t-4 border-purple-600">
                <div class="p-2 border-b bg-purple-50 text-[10px] font-bold uppercase text-purple-800">3. Variables</div>
                <div class="overflow-y-auto alto-fijo">
                    <table class="w-full text-left border-collapse tabla-ultra-compacta">
                        <thead class="sticky top-0 bg-slate-100 shadow-sm text-[9px] uppercase text-slate-500">
                            <tr><th class="p-1 border-b">Campo</th><th class="p-1 border-b">Valor</th></tr>
                        </thead>
                        <tbody id="tablaCuerpo" class="divide-y divide-slate-100 text-[11px]"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>


    <script>
        const input = document.getElementById('inputReporte');
        const outputSTS = document.getElementById('outputSTS');
        const tabla = document.getElementById('tablaCuerpo');
        const tituloReporte = document.getElementById('tituloReporte');
        const tiempoTranscurrido = document.getElementById('tiempoTranscurrido');
        const contTiempo = document.getElementById('contTiempo');


        setInterval(() => { if (input.value) procesar(); }, 1000);
        input.addEventListener('input', procesar);


        function procesar() {
            const texto = input.value.trim();
            if (!texto) { limpiarTodo(); return; }


            let dOrig = {}; let dMin = {};
            const novMatch = texto.match(/\*Novedades SIRCI\*\s*([^\/]+)/i);
            const tipoNov = novMatch ? novMatch[1].trim() : "Novedad";
           
            texto.split('/').forEach(p => {
                if (p.includes(':')) {
                    let [kRaw, ...vParts] = p.split(':');
                    const k = kRaw.trim(); const v = vParts.join(':').trim();
                    dOrig[k] = v;
                    const kNorm = k.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                    dMin[kNorm] = v;
                }
            });


            const getVar = (n) => dMin[n.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "")] || '';


            const movil = getVar('Movil');
            const ruta = getVar('Ruta');
            const dirExtraida = getVar('Direccion');
           
            tituloReporte.innerText = `${movil || '---'} - ${tipoNov}`;


            let html = "";
            for (const [k, v] of Object.entries(dOrig)) {
                html += `<tr><td class="font-bold text-slate-500 bg-slate-50 border-r text-[10px] uppercase">${k}</td><td class="text-slate-800 font-medium">${v}</td></tr>`;
            }
            tabla.innerHTML = html;


            outputSTS.value = `Detalle del reporte\n\nNombre de contacto: AUXILIAR STS\nTeléfono de contacto: 3242911287\nTabla: ${getVar('Tabla')}\nRuta: ${ruta}\nViaje: ${getVar('Viaje')}\nServicio: ZONAL\nDescripción del reporte: ${tipoNov} \nFecha y hora: ${getVar('Fecha')} ${getVar('Hora')}\nCódigo operador: ${getVar('Operador')}\nUbicación: ${dirExtraida}`;


            // URL EXACTA SOLICITADA
            if (dirExtraida) {
                const urlMaps = `https://www.google.com/maps/dir/${encodeURIComponent(dirExtraida)} bogota/Greenmovil`;
                document.getElementById('contenedorMapa').innerHTML = `<a href="${urlMaps}" target="_blank" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-black text-xs shadow-lg w-full text-center">ver ubicacion GOOGLE MAPS</a>`;
            }
           
            calcTiempo(getVar('Fecha'), getVar('Hora'));
        }


        function calcTiempo(f, h) {
            if (!f || !h) return;
            const [d, m, a] = f.split('-').map(Number);
            const [hh, mm] = h.split(':').map(Number);
            const diff = Math.floor((new Date() - new Date(a, m - 1, d, hh, mm)) / 60000);
            tiempoTranscurrido.innerText = diff < 60 ? `${diff} MIN` : `${Math.floor(diff/60)}H ${diff%60}M`;
            if (diff >= 20) contTiempo.classList.add('alerta-critica');
            else contTiempo.classList.remove('alerta-critica');
        }


        function copiarTextoSimple(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
        }


        function copiarTextoArea(id) {
            const area = document.getElementById(id);
            area.select();
            document.execCommand('copy');
        }


        function limpiarTodo() {
            input.value = ""; outputSTS.value = ""; tabla.innerHTML = "";
            tituloReporte.innerText = "Esperando datos..."; tiempoTranscurrido.innerText = "--";
            contTiempo.classList.remove('alerta-critica');
            document.getElementById('contenedorMapa').innerHTML = `<button disabled class="bg-slate-600 text-slate-500 px-4 py-2 rounded text-xs font-bold w-full cursor-not-allowed uppercase">Sin Ubicación</button>`;
        }
    </script>
</body>
</html>
